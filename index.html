<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Directory</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #333;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 8px;
      color: #1a1a2e;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 40px;
      font-size: 0.95rem;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 16px;
      background: #e0e0e0;
      border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .avatar-placeholder {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      color: white;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 0.88rem;
      color: #555;
      line-height: 1.6;
    }

    #status {
      text-align: center;
      color: #888;
      font-size: 0.95rem;
      margin-top: 60px;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #ddd;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <h1>Our Directory</h1>
  <p class="subtitle">Submitted profiles appear here automatically.</p>

  <div id="grid"></div>
  <div id="status"><span class="spinner"></span> Loading profiles…</div>

  <script>
    // Google Apps Script Web App URL here
    const API_URL = "https://script.google.com/macros/s/AKfycbxAK3jyaFNq6IBCP6ZHzEYbPg1j7mA3ecX0hcDzBIfvRD-PrDqsRCmMgv7N1MWX5ayq1Q/exec";

    async function loadProfiles() {
      const grid   = document.getElementById("grid");
      const status = document.getElementById("status");

      try {
        const res  = await fetch(API_URL);
        const data = await res.json();

        status.style.display = "none";

        if (!data.length) {
          status.textContent = "No profiles yet. Be the first to submit!";
          status.style.display = "block";
          return;
        }

        data.forEach(({ name, bio, imageUrl }) => {
          const card = document.createElement("div");
          card.className = "card";

          const initial = name ? name.charAt(0).toUpperCase() : "?";

          const avatarHTML = imageUrl
            ? `<img class="avatar" src="${imageUrl}" alt="${name}" onerror="this.replaceWith(makePlaceholder('${initial}'))">`
            : `<div class="avatar-placeholder">${initial}</div>`;

          card.innerHTML = `
            ${avatarHTML}
            <h2>${escHtml(name)}</h2>
            <p>${escHtml(bio).replace(/\n/g, '<br>')}</p>
          `;
          grid.appendChild(card);
        });

      } catch (err) {
        status.textContent = "⚠️ Could not load profiles. Check your API URL.";
        console.error(err);
      }
    }

    function makePlaceholder(initial) {
      const d = document.createElement("div");
      d.className = "avatar-placeholder";
      d.textContent = initial;
      return d;
    }

    function escHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    loadProfiles();
  </script>
</body>
</html>
